<svg xmlns="http://www.w3.org/2000/svg" width="1560" height="1260" viewBox="0 0 1560 1260">
  <defs>
    <style>
      .bg { fill: #f8f6f1; }
      .lane { fill: #efe8dc; stroke: #d8c9b5; stroke-width: 1.5; rx: 18; ry: 18; }
      .box { fill: #ffffff; stroke: #263238; stroke-width: 2; rx: 14; ry: 14; }
      .box2 { fill: #fff8e7; stroke: #8d6e63; stroke-width: 2; rx: 14; ry: 14; }
      .title { font: 700 28px Arial, sans-serif; fill: #1b1f23; }
      .text { font: 16px Arial, sans-serif; fill: #1b1f23; }
      .small { font: 14px Arial, sans-serif; fill: #455a64; }
      .label { font: 700 15px Arial, sans-serif; fill: #5d4037; }
      .arrow { stroke: #37474f; stroke-width: 2.5; fill: none; marker-end: url(#arrowhead); }
      .dash { stroke: #6d4c41; stroke-width: 2.5; fill: none; stroke-dasharray: 8 6; marker-end: url(#arrowheadBrown); }
      .branch { stroke: #546e7a; stroke-width: 2.2; fill: none; marker-end: url(#arrowheadBlue); }
      .note { fill: #f7efe0; stroke: #c8b79c; stroke-width: 1.5; rx: 12; ry: 12; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <polygon points="0,0 10,4 0,8" fill="#37474f" />
    </marker>
    <marker id="arrowheadBrown" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <polygon points="0,0 10,4 0,8" fill="#6d4c41" />
    </marker>
    <marker id="arrowheadBlue" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <polygon points="0,0 10,4 0,8" fill="#546e7a" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1560" height="1260" />
  <text class="title" x="50" y="52">Mini-SGLang KV Cache 全流程管理链路</text>
  <text class="small" x="50" y="82">匹配、分配、插入、写回、加载、驱逐、完整性检查</text>

  <rect class="lane" x="40" y="110" width="1480" height="1090" />

  <rect class="box" x="70" y="160" width="260" height="86" />
  <text class="text" x="200" y="194" text-anchor="middle">Scheduler</text>
  <text class="small" x="200" y="219" text-anchor="middle">收到 batch / req</text>

  <rect class="box" x="370" y="160" width="290" height="86" />
  <text class="text" x="515" y="194" text-anchor="middle">CacheManager.match_req</text>
  <text class="small" x="515" y="219" text-anchor="middle">找到命中的 prefix</text>

  <rect class="box" x="700" y="160" width="270" height="86" />
  <text class="text" x="835" y="194" text-anchor="middle">Prefix Cache</text>
  <text class="small" x="835" y="219" text-anchor="middle">Radix / HiRadix 树</text>

  <rect class="box2" x="1010" y="160" width="410" height="86" />
  <text class="text" x="1215" y="194" text-anchor="middle">输出 match result</text>
  <text class="small" x="1215" y="219" text-anchor="middle">cuda_handle / host_handle / cached_len</text>

  <path class="arrow" d="M 330 203 L 370 203" />
  <path class="arrow" d="M 660 203 L 700 203" />
  <path class="arrow" d="M 970 203 L 1010 203" />

  <rect class="box" x="70" y="305" width="260" height="86" />
  <text class="text" x="200" y="339" text-anchor="middle">allocate_paged</text>
  <text class="small" x="200" y="364" text-anchor="middle">为新 tokens 分配 page table</text>

  <rect class="box" x="370" y="305" width="290" height="86" />
  <text class="text" x="515" y="339" text-anchor="middle">_allocate / evict</text>
  <text class="small" x="515" y="364" text-anchor="middle">不够则先回收可驱逐页</text>

  <rect class="box" x="700" y="305" width="270" height="86" />
  <text class="text" x="835" y="339" text-anchor="middle">page_table 更新</text>
  <text class="small" x="835" y="364" text-anchor="middle">写入新 token 的物理页号</text>

  <rect class="box2" x="1010" y="305" width="410" height="86" />
  <text class="text" x="1215" y="339" text-anchor="middle">可用于 attention kernel</text>
  <text class="small" x="1215" y="364" text-anchor="middle">out_loc / input_mapping / write_mapping</text>

  <path class="arrow" d="M 330 348 L 370 348" />
  <path class="arrow" d="M 660 348 L 700 348" />
  <path class="arrow" d="M 970 348 L 1010 348" />

  <rect class="box" x="70" y="455" width="260" height="86" />
  <text class="text" x="200" y="489" text-anchor="middle">cache_req</text>
  <text class="small" x="200" y="514" text-anchor="middle">把 prefix 写入 cache</text>

  <rect class="box" x="370" y="455" width="290" height="86" />
  <text class="text" x="515" y="489" text-anchor="middle">insert_prefix</text>
  <text class="small" x="515" y="514" text-anchor="middle">创建 / split radix 节点</text>

  <rect class="box" x="700" y="455" width="270" height="86" />
  <text class="text" x="835" y="489" text-anchor="middle">lock / unlock</text>
  <text class="small" x="835" y="514" text-anchor="middle">保护正在使用的节点</text>

  <rect class="box2" x="1010" y="455" width="410" height="86" />
  <text class="text" x="1215" y="489" text-anchor="middle">new_handle / cached_len</text>
  <text class="small" x="1215" y="514" text-anchor="middle">更新句柄与旧 cache 区间</text>

  <path class="arrow" d="M 330 498 L 370 498" />
  <path class="arrow" d="M 660 498 L 700 498" />
  <path class="arrow" d="M 970 498 L 1010 498" />

  <rect class="box" x="70" y="605" width="260" height="86" />
  <text class="text" x="200" y="639" text-anchor="middle">HiCache prepare_write</text>
  <text class="small" x="200" y="664" text-anchor="middle">仅在 hiradix 时启用</text>

  <rect class="box" x="370" y="605" width="290" height="86" />
  <text class="text" x="515" y="639" text-anchor="middle">get_writable_length</text>
  <text class="small" x="515" y="664" text-anchor="middle">找出 device-only 连续段</text>

  <rect class="note" x="705" y="603" width="205" height="36" />
  <text class="label" x="807" y="627" text-anchor="middle">是否超过阈值?</text>

  <rect class="box2" x="960" y="605" width="460" height="86" />
  <text class="text" x="1190" y="639" text-anchor="middle">分配 host 并登记写任务</text>
  <text class="small" x="1190" y="664" text-anchor="middle">_try_allocate_host → set_host → write_queue</text>

  <path class="arrow" d="M 330 648 L 370 648" />
  <path class="arrow" d="M 660 648 L 705 648" />
  <path class="arrow" d="M 910 621 L 960 648" />
  <path class="dash" d="M 910 676 L 960 676" />

  <rect class="box" x="70" y="765" width="260" height="86" />
  <text class="text" x="200" y="799" text-anchor="middle">start_write</text>
  <text class="small" x="200" y="824" text-anchor="middle">切到写流，记录 ack</text>

  <rect class="box" x="370" y="765" width="290" height="86" />
  <text class="text" x="515" y="799" text-anchor="middle">_merge_transactions</text>
  <text class="small" x="515" y="824" text-anchor="middle">合并 host / cuda 索引</text>

  <rect class="box" x="700" y="765" width="270" height="86" />
  <text class="text" x="835" y="799" text-anchor="middle">store_all</text>
  <text class="small" x="835" y="824" text-anchor="middle">调用 transfer_hicache_all_layer</text>

  <rect class="box2" x="1010" y="765" width="410" height="86" />
  <text class="text" x="1215" y="799" text-anchor="middle">device → host 写回完成</text>
  <text class="small" x="1215" y="824" text-anchor="middle">host backup 可供后续 evict / 共享</text>

  <path class="arrow" d="M 330 808 L 370 808" />
  <path class="arrow" d="M 660 808 L 700 808" />
  <path class="arrow" d="M 970 808 L 1010 808" />

  <rect class="box" x="70" y="920" width="260" height="86" />
  <text class="text" x="200" y="954" text-anchor="middle">refresh</text>
  <text class="small" x="200" y="979" text-anchor="middle">all_reduce 统一确认完成数</text>

  <rect class="box" x="370" y="920" width="290" height="86" />
  <text class="text" x="515" y="954" text-anchor="middle">unlock handles</text>
  <text class="small" x="515" y="979" text-anchor="middle">完成后解除锁</text>

  <rect class="box2" x="700" y="920" width="720" height="86" />
  <text class="text" x="1060" y="954" text-anchor="middle">check_integrity / available_size / free_slots</text>
  <text class="small" x="1060" y="979" text-anchor="middle">周期性检查 cache 是否一致，并决定下一轮 allocate / evict</text>

  <path class="arrow" d="M 330 963 L 370 963" />
  <path class="arrow" d="M 660 963 L 700 963" />

  <rect class="note" x="70" y="1088" width="1420" height="66" />
  <text class="small" x="780" y="1116" text-anchor="middle">例子：page_size=16，某请求输入 80 tokens，前 48 tokens 命中 cache，新增 32 tokens 走 allocate_paged + cache_req；若是 HiCache 且写长度超过阈值，就进入 prepare_write/start_write，把 device-only KV 提前写到 host。</text>
  <text class="small" x="780" y="1140" text-anchor="middle">这样后续显存紧张时，evict 可以优先回收 device 侧页，但 host 侧仍保留备份，既降低内存压力，也保留跨请求复用能力。</text>
</svg>
